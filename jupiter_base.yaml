geometry:
  type: gnomonic-equiangle
  bounds:
    x1min: 71492000.0          # Jupiter equatorial radius (m)
    x1max: 71492100.0
    x2min_pi: -0.25
    x2max_pi: 0.25
    x3min_pi: -0.25
    x3max_pi: 0.25
  cells:
    nx1: 1
    nx2: 96
    nx3: 96
    nghost: 3
distribute:
  backend: nccl
  layout: cubed-sphere
  nb2: 1
  nb3: 1
  blocks_per_process: 1
  verbose: false
dynamics:
  equation-of-state: {type: shallow-water}
  reconstruct:
    vertical:   {type: weno5, scale: false, shock: false}
    horizontal: {type: weno5, scale: false, shock: false}
  riemann-solver: {type: shallow-roe, dir: yz}
boundary-condition:
  external:
    x1-inner: reflecting
    x1-outer: reflecting
    x2-inner: custom
    x2-outer: custom
    x3-inner: custom
    x3-outer: custom
integration: {type: rk3, cfl: 0.7, nlim: -1, tlim: 8.64e7, ncycle_out: 500}
outputs:
- {type: netcdf, variables: [prim], dt: 8.64e4}
forcing:
  coriolis: {type: xyz, omega1: 1.7585e-4}   # Jupiter rotation rate (rad/s)
problem: {note: Jupiter shallow water base config}
